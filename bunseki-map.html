<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ビジネスフレームワーク統合マップ</title>
    
    <!-- React & ReactDOM（バージョン固定） -->
    <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
    
    <!-- Babel（JSX変換 / v8はimportを自動挿入し白画面になるため7系最新に固定） -->
    <script src="https://unpkg.com/@babel/standalone@7.29.7/babel.min.js"></script>
    
    <!-- Tailwind CSS（バージョン固定） -->
    <script src="https://cdn.tailwindcss.com/3.4.16"></script>

    <style>
        /* スムーズスクロール用 */
        html {
            scroll-behavior: smooth;
        }
        /* カスタムスクロールバー（オプション） */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        /* 印刷用レポート: 画面上は通常表示、印刷時はレポート領域だけを出力する */
        @media print {
            body * {
                visibility: hidden;
            }
            #report-print-area, #report-print-area * {
                visibility: visible;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            #report-print-area {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
            }
            .no-print {
                display: none !important;
            }
        }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- PESTEL結果の保存キー（既存のframeworkUrlsとは別領域） ---
        const RESULT_STORAGE_KEY = 'bunsekiMap_v1';
        const BASIC_INFO_KEY = 'bunsekiMap_basicInfo_v1';

        // 実際の今日の日付を YYYY-MM-DD で返す（AIに日付を推測させないため）
        function todayStr() {
            const d = new Date();
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        // 基本情報の初期値
        const EMPTY_BASIC = { subject:'', industry:'', location:'', size:'', business:'', issues:'', memo:'' };

        function loadBasicInfo() {
            try {
                const raw = localStorage.getItem(BASIC_INFO_KEY);
                return raw ? { ...EMPTY_BASIC, ...JSON.parse(raw) } : { ...EMPTY_BASIC };
            } catch (e) { console.warn('基本情報の読み込みに失敗:', e); return { ...EMPTY_BASIC }; }
        }

        // 分析メタ（名称・framework）
        const ANALYSIS_META = {
            pestel:   { name: 'PESTEL分析' },
            '5forces':{ name: '5フォース分析' },
            '3c':     { name: '3C分析' },
            swot:     { name: 'クロスSWOT分析' },
            strategy: { name: '基本競争戦略' },
            bmc:      { name: 'ビジネスモデルキャンバス' },
            '4p':     { name: '4P分析' },
            '7s':     { name: '7S分析' },
            innovator:{ name: '課題解決イノベーター' },
        };

        // 各frameworkのdataスキーマ例（プロンプト末尾に貼る・仕様書§5.2と同一ソース）
        const SCHEMA_EXAMPLES = {
            pestel: `{
  "schemaVersion": "1.0", "framework": "pestel", "subject": "{subject}",
  "analyzedAt": "YYYY-MM-DD", "summary": "PESTEL分析全体の要約を1〜2文",
  "data": {
    "politics":    [ { "item": "政治的要因", "type": "機会", "note": "" } ],
    "economy":     [ { "item": "経済的要因", "type": "脅威", "note": "" } ],
    "society":     [ { "item": "社会的要因", "type": "中立", "note": "" } ],
    "technology":  [ { "item": "技術的要因", "type": "機会", "note": "" } ],
    "environment": [ { "item": "環境的要因", "type": "中立", "note": "" } ],
    "legal":       [ { "item": "法的要因",   "type": "脅威", "note": "" } ]
  }
}`,
            '5forces': `{
  "schemaVersion": "1.0", "framework": "5forces", "subject": "{subject}",
  "analyzedAt": "YYYY-MM-DD", "summary": "5フォース分析全体の要約を1〜2文",
  "data": {
    "rivalry":     { "level": "高", "factors": ["根拠"] },
    "newEntrants": { "level": "中", "factors": ["根拠"] },
    "substitutes": { "level": "中", "factors": ["根拠"] },
    "buyers":      { "level": "低", "factors": ["根拠"] },
    "suppliers":   { "level": "低", "factors": ["根拠"] },
    "overall":     "業界収益性の総評（1〜2文）"
  }
}`,
            '3c': `{
  "schemaVersion": "1.0", "framework": "3c", "subject": "{subject}",
  "analyzedAt": "YYYY-MM-DD", "summary": "3C分析全体の要約を1〜2文",
  "data": {
    "customer":   ["顧客・市場に関する発見"],
    "competitor": ["競合に関する発見"],
    "company":    ["自社に関する発見"],
    "ksf":        ["導出した成功要因"]
  }
}`,
            swot: `{
  "schemaVersion": "1.0", "framework": "swot", "subject": "{subject}",
  "analyzedAt": "YYYY-MM-DD", "summary": "クロスSWOT分析全体の要約を1〜2文",
  "data": {
    "strengths": ["強み"], "weaknesses": ["弱み"],
    "opportunities": ["機会"], "threats": ["脅威"],
    "cross": {
      "so": ["強み×機会の打ち手"], "wo": ["弱み×機会の打ち手"],
      "st": ["強み×脅威の打ち手"], "wt": ["弱み×脅威の打ち手"]
    }
  }
}`,
            strategy: `{
  "schemaVersion": "1.0", "framework": "strategy", "subject": "{subject}",
  "analyzedAt": "YYYY-MM-DD", "summary": "基本競争戦略の結論を1〜2文",
  "data": {
    "position":  "差別化",
    "rationale": "選定理由（1〜2文）",
    "actions":   ["具体アクション"]
  }
}`,
            bmc: `{
  "schemaVersion": "1.0", "framework": "bmc", "subject": "{subject}",
  "analyzedAt": "YYYY-MM-DD", "summary": "ビジネスモデル全体の要約を1〜2文",
  "data": {
    "kp": ["パートナー"], "ka": ["主要活動"], "kr": ["リソース"],
    "vp": ["価値提案"], "cr": ["顧客との関係"], "ch": ["チャネル"],
    "cs": ["顧客セグメント"], "cost": ["コスト構造"], "revenue": ["収益の流れ"]
  }
}`,
            '4p': `{
  "schemaVersion": "1.0", "framework": "4p", "subject": "{subject}",
  "analyzedAt": "YYYY-MM-DD", "summary": "4P分析全体の要約を1〜2文",
  "data": {
    "product":   ["製品・サービスの戦術"],
    "price":     ["価格の戦術"],
    "place":     ["流通・場所の戦術"],
    "promotion": ["販促・広告の戦術"]
  }
}`,
            '7s': `{
  "schemaVersion": "1.0", "framework": "7s", "subject": "{subject}",
  "analyzedAt": "YYYY-MM-DD", "summary": "7S分析全体の要約を1〜2文",
  "data": {
    "strategy":     { "current": "現状", "issue": "課題" },
    "structure":    { "current": "現状", "issue": "課題" },
    "systems":      { "current": "現状", "issue": "課題" },
    "sharedValues": { "current": "現状", "issue": "課題" },
    "skills":       { "current": "現状", "issue": "課題" },
    "staff":        { "current": "現状", "issue": "課題" },
    "style":        { "current": "現状", "issue": "課題" },
    "alignment":    "整合性の総評（1〜2文）"
  }
}`,
        };

        // 既存の分析結果から、後続分析へ引き継ぐ材料を箇条書きテキストに整形する。
        // 引き継ぎ元が増える（結果ビューを実装する）たびに、ここに1ブロック足すだけで
        // 後続プロンプトが自動的に充実する設計。
        function buildContextBlock(targetId, results) {
            const lines = [];
            const pestel = results['pestel'];
            // PESTEL → 5forces / 3c / swot に機会・脅威を引き継ぐ
            if (pestel && ['5forces', '3c', 'swot'].includes(targetId)) {
                const picks = [];
                ['politics','economy','society','technology','environment','legal'].forEach(k => {
                    (pestel.data[k] || []).forEach(it => {
                        if (it && (it.type === '機会' || it.type === '脅威')) {
                            picks.push(`  ${it.type}: ${it.item}`);
                        }
                    });
                });
                if (pestel.summary) picks.unshift(`  総括: ${pestel.summary}`);
                if (picks.length) {
                    lines.push(`■ PESTEL分析（${pestel.analyzedAt || ''} 実施）の機会・脅威`);
                    lines.push(...picks);
                }
            }
            // 5フォース → 3c / swot に業界総評を引き継ぐ
            const forces = results['5forces'];
            if (forces && ['3c', 'swot'].includes(targetId)) {
                if (forces.data && forces.data.overall) {
                    lines.push(`■ 5フォース分析（${forces.analyzedAt || ''} 実施）の業界総評`);
                    lines.push(`  ${forces.data.overall}`);
                }
            }
            // 3C → swot に自社・顧客・競合・KSFを引き継ぐ
            const threec = results['3c'];
            if (threec && ['swot'].includes(targetId)) {
                const d = threec.data || {};
                const block = [];
                if (Array.isArray(d.company) && d.company.length)    block.push(`  自社: ${d.company.join(' / ')}`);
                if (Array.isArray(d.customer) && d.customer.length)  block.push(`  顧客: ${d.customer.join(' / ')}`);
                if (Array.isArray(d.competitor) && d.competitor.length) block.push(`  競合: ${d.competitor.join(' / ')}`);
                if (Array.isArray(d.ksf) && d.ksf.length)            block.push(`  KSF: ${d.ksf.join(' / ')}`);
                if (block.length) {
                    lines.push(`■ 3C分析（${threec.analyzedAt || ''} 実施）`);
                    lines.push(...block);
                }
            }
            // SWOT → strategy / bmc / 7s に強み・弱み・クロス戦略を引き継ぐ
            const swot = results['swot'];
            if (swot && ['strategy', 'bmc', '7s'].includes(targetId)) {
                const d = swot.data || {};
                const block = [];
                if (Array.isArray(d.strengths) && d.strengths.length)   block.push(`  強み: ${d.strengths.join(' / ')}`);
                if (Array.isArray(d.weaknesses) && d.weaknesses.length) block.push(`  弱み: ${d.weaknesses.join(' / ')}`);
                const c = d.cross || {};
                const crossPairs = [];
                if (Array.isArray(c.so) && c.so.length) crossPairs.push(`SO(積極): ${c.so.join(' / ')}`);
                if (Array.isArray(c.wo) && c.wo.length) crossPairs.push(`WO(改善): ${c.wo.join(' / ')}`);
                if (Array.isArray(c.st) && c.st.length) crossPairs.push(`ST(差別化): ${c.st.join(' / ')}`);
                if (Array.isArray(c.wt) && c.wt.length) crossPairs.push(`WT(防衛): ${c.wt.join(' / ')}`);
                crossPairs.forEach(cp => block.push(`  ${cp}`));
                if (block.length) {
                    lines.push(`■ クロスSWOT分析（${swot.analyzedAt || ''} 実施）`);
                    lines.push(...block);
                }
            }
            // 基本競争戦略 → bmc / 4p にポジションとアクションを引き継ぐ
            const strategy = results['strategy'];
            if (strategy && ['bmc', '4p'].includes(targetId)) {
                const d = strategy.data || {};
                const block = [];
                if (d.position) block.push(`  採用ポジション: ${d.position}`);
                if (d.rationale) block.push(`  理由: ${d.rationale}`);
                if (Array.isArray(d.actions) && d.actions.length) block.push(`  アクション: ${d.actions.join(' / ')}`);
                if (block.length) {
                    lines.push(`■ 基本競争戦略（${strategy.analyzedAt || ''} 実施）`);
                    lines.push(...block);
                }
            }
            // BMC → 4p に価値提案・チャネル・顧客セグメントを引き継ぐ
            const bmc = results['bmc'];
            if (bmc && ['4p'].includes(targetId)) {
                const d = bmc.data || {};
                const block = [];
                if (Array.isArray(d.vp) && d.vp.length) block.push(`  価値提案(VP): ${d.vp.join(' / ')}`);
                if (Array.isArray(d.cs) && d.cs.length) block.push(`  顧客セグメント(CS): ${d.cs.join(' / ')}`);
                if (Array.isArray(d.ch) && d.ch.length) block.push(`  チャネル(CH): ${d.ch.join(' / ')}`);
                if (Array.isArray(d.revenue) && d.revenue.length) block.push(`  収益の流れ: ${d.revenue.join(' / ')}`);
                if (block.length) {
                    lines.push(`■ ビジネスモデルキャンバス（${bmc.analyzedAt || ''} 実施）`);
                    lines.push(...block);
                }
            }
            // 4P → 7s にマーケティング施策を引き継ぐ（実行できる組織かを問う）
            const fourp = results['4p'];
            if (fourp && ['7s'].includes(targetId)) {
                const d = fourp.data || {};
                const block = [];
                if (Array.isArray(d.product) && d.product.length)     block.push(`  製品(Product): ${d.product.join(' / ')}`);
                if (Array.isArray(d.promotion) && d.promotion.length) block.push(`  販促(Promotion): ${d.promotion.join(' / ')}`);
                if (Array.isArray(d.place) && d.place.length)         block.push(`  流通(Place): ${d.place.join(' / ')}`);
                if (block.length) {
                    lines.push(`■ 4P分析（${fourp.analyzedAt || ''} 実施）`);
                    lines.push(...block);
                }
            }
            // ※ 後続分析（7s等）の結果ビュー実装時に、ここへ引き継ぎブロックを追加していく
            return lines.join('\n');
        }

        // 分析用プロンプトを生成（基本情報＋引き継ぎ材料＋出力ルール＋スキーマ）
        function buildPrompt(analysisId, basicInfo, results) {
            const meta = ANALYSIS_META[analysisId] || { name: analysisId };
            const bi = basicInfo || EMPTY_BASIC;
            const infoLines = [];
            if (bi.subject)  infoLines.push(`会社名: ${bi.subject}`);
            if (bi.industry) infoLines.push(`業種: ${bi.industry}`);
            if (bi.location) infoLines.push(`所在地: ${bi.location}`);
            if (bi.size)     infoLines.push(`規模: ${bi.size}`);
            if (bi.business) infoLines.push(`事業内容: ${bi.business}`);
            if (bi.issues)   infoLines.push(`現状の課題: ${bi.issues}`);
            if (bi.memo)     infoLines.push(`補足メモ: ${bi.memo}`);

            const ctx = buildContextBlock(analysisId, results);
            const schema = (SCHEMA_EXAMPLES[analysisId] || '{}').replace(/\{subject\}/g, bi.subject || '（会社名）');

            let p = `以下の企業について${meta.name}を行います。対話形式で私に質問しながら分析を深めてください。\n\n`;
            p += `【基本情報】\n${infoLines.join('\n')}\n\n`;
            if (ctx) p += `【これまでの分析結果（参考にしてください）】\n${ctx}\n\n`;
            p += `【結果出力ルール】\n`;
            p += `分析がまとまった後、私が「JSON出力」と入力したら、結果を以下のJSON形式で出力してください。\n`;
            p += `- 出力はJSONオブジェクト1個のみ。前後に説明・見出し・補足を書かない\n`;
            p += `- 下記の項目をすべて含める。該当が無い項目も省略せず空配列[]または空文字""を入れる\n`;
            p += `- スキーマに無いキーを追加しない。キーは英語小文字、値は日本語\n`;
            p += `- "framework"は"${analysisId}"、"subject"は"${bi.subject || '（会社名）'}"\n`;
            p += `- "analyzedAt"は必ず "${todayStr()}" にする（これが今日の実際の日付。自分で日付を推測・生成しない）\n\n`;
            p += schema;
            return p;
        }

        // 課題解決イノベーター用プロンプト（集約対象外・全分析の要約を素材に他業種アイデアを引き出す）
        function buildInnovatorPrompt(basicInfo, results) {
            const bi = basicInfo || EMPTY_BASIC;
            const infoLines = [];
            if (bi.subject)  infoLines.push(`会社名: ${bi.subject}`);
            if (bi.industry) infoLines.push(`業種: ${bi.industry}`);
            if (bi.business) infoLines.push(`事業内容: ${bi.business}`);
            if (bi.issues)   infoLines.push(`現状の課題: ${bi.issues}`);

            // 取込済みの全分析から要約と主要な課題材料を集める
            const order = ['pestel','5forces','3c','swot','strategy','bmc','4p','7s'];
            const done = [];
            order.forEach(id => {
                const r = results[id];
                if (r && r.summary) done.push(`■ ${(ANALYSIS_META[id]||{}).name}: ${r.summary}`);
            });
            // SWOTの弱み・脅威があれば「解くべき課題」として明示
            const problems = [];
            const swot = results['swot'];
            if (swot && swot.data) {
                (swot.data.weaknesses || []).forEach(w => problems.push(`弱み: ${w}`));
                (swot.data.threats || []).forEach(t => problems.push(`脅威: ${t}`));
            }

            let p = `私の会社が抱える課題を、他業種の成功事例の仕組みを応用して解決する画期的なアイデアを一緒に考えてください。`;
            p += `対話形式で、視点を変える問いを投げかけながら発想を広げてください。\n\n`;
            p += `【基本情報】\n${infoLines.join('\n')}\n\n`;
            if (done.length) p += `【これまでの分析結果の要約】\n${done.join('\n')}\n\n`;
            if (problems.length) p += `【特に解決したい課題】\n${problems.join('\n')}\n\n`;
            p += `【進め方】\n`;
            p += `- まず、上記から「最も解く価値のある課題」を一緒に1つ絞り込んでください。\n`;
            p += `- その課題に対し、まったく異なる業種（例: 製造業の課題に飲食業やゲーム業界の仕組みを当てる等）の成功パターンを複数持ち出してください。\n`;
            p += `- それぞれを私の会社にどう応用できるか、具体的なアイデアに落として提案してください。\n`;
            return p;
        }

        // 保存済み結果の読み込み（try/catchでガード）
        function loadResults() {
            try {
                const raw = localStorage.getItem(RESULT_STORAGE_KEY);
                return raw ? JSON.parse(raw) : {};
            } catch (e) {
                console.warn('結果の読み込みに失敗:', e);
                return {};
            }
        }

        // 貼り付けテキストを指定frameworkのスキーマとして検証（アプリは落とさない・汎用）
        function parseResultJson(text, expectedFramework, frameworkLabel) {
            const clean = String(text).replace(/```json|```/g, '').trim();
            let obj;
            try {
                obj = JSON.parse(clean);
            } catch (e) {
                return { ok: false, error: 'JSONとして読み取れませんでした。テキストが正しくコピーされているか確認してください。' };
            }
            if (!obj || typeof obj !== 'object') {
                return { ok: false, error: 'JSONオブジェクトではありません。' };
            }
            if (obj.framework !== expectedFramework) {
                return { ok: false, error: 'これは' + frameworkLabel + 'の結果ではありません（framework: ' + (obj.framework || '不明') + '）。' };
            }
            if (!obj.data || typeof obj.data !== 'object') {
                return { ok: false, error: 'data項目がありません。' };
            }
            return { ok: true, value: obj };
        }

        // 貼り付けテキストをPESTELスキーマとして検証（アプリは落とさない）
        function parsePestelJson(text) {
            return parseResultJson(text, 'pestel', 'PESTEL分析');
        }

        // --- アイコンコンポーネント (Lucide Icons SVG) ---
        const IconGlobe = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="2" x2="22" y1="12" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        );
        const IconTarget = ({ size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
        );
        const IconUsers = ({ size = 24, className = "" }) => (

                setBasicInfo({ ...EMPTY_BASIC });
                setUrls(defaultUrls);
                setToast('すべてのデータを削除しました');
            };

            const exportAllData = () => {
                const payload = {
                    appVersion: '1.0',
                    exportedAt: new Date().toISOString(),
                    basicInfo,
                    results,
                };
                try {
                    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    const dateStr = todayStr().replace(/-/g, '');
                    const nameStr = (basicInfo.subject || '分析データ').replace(/[\\/:*?"<>|]/g, '_');
                    a.href = url;
                    a.download = `分析統合マップ_${nameStr}_${dateStr}.json`;
                    document.body.appendChild(a);
                    a.click();
                    // ブラウザがダウンロードを開始する時間を確保してから解放する
                    // （即座にrevokeするとダイアログ表示が遅延することがある）
                    setTimeout(() => {
                        try { document.body.removeChild(a); } catch (e) {}
                        URL.revokeObjectURL(url);
                    }, 3000);
                    setToast('全結果をJSONで書き出しました');
                } catch (e) {
                    console.warn('エクスポートに失敗:', e);

                                    <span className="text-xs font-bold bg-emerald-100 text-emerald-700 px-2 py-1 rounded">✓ 取込済 {String(threecResult.analyzedAt || '').slice(5).replace('-', '/')}</span>
                                ) : (
                                    <span className="text-xs font-bold bg-slate-100 text-slate-400 px-2 py-1 rounded">未取込</span>
                                )}
                                <span className="text-xs font-semibold bg-emerald-100 text-emerald-800 px-2 py-1 rounded">成功要因(KSF)</span>
                            </div>
                        </div>
                        <div className="mb-3 relative z-20"><PromptButton onClick={() => openPrompt('3c')} /></div>
                        
                        {/* 3C Triangle Layout */}
                        <div className="flex flex-col items-center relative py-4">
                            
                            {/* Background Triangle SVG */}
                            <svg className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-80 h-64 pointer-events-none z-0 opacity-20" viewBox="0 0 200 160">
                                <path d="M100 20 L20 140 L180 140 Z" fill="none" stroke="#10b981" strokeWidth="2" strokeDasharray="5,5" />
                            </svg>

                            {/* Top: Customer */}
                            <div className="z-10 mb-8">
                                <div className="w-24 h-24 rounded-full bg-emerald-100 flex flex-col justify-center items-center p-2 border-2 border-emerald-300 shadow-sm bg-white">
                                    <IconUsers size={24} className="text-emerald-600 mb-1"/>
                                    <span className="text-sm font-bold text-emerald-800">Customer</span>
                                    <span className="text-xs text-emerald-600">市場・顧客</span>
                                </div>
                            </div>

                            {/* Bottom Row */}
                            <div className="flex justify-between w-full max-w-sm px-4 z-10 gap-8">
                                {/* Left: Company */}
                                <div className="w-24 h-24 rounded-full bg-emerald-100 flex flex-col justify-center items-center p-2 border-2 border-emerald-300 shadow-sm bg-white">
                                    <IconBriefcase size={24} className="text-emerald-600 mb-1"/>
                                    <span className="text-sm font-bold text-emerald-800">Company</span>
                                    <span className="text-xs text-emerald-600">自社</span>
                                </div>

                                {/* Right: Competitor */}
                                <div className="w-24 h-24 rounded-full bg-emerald-100 flex flex-col justify-center items-center p-2 border-2 border-emerald-300 shadow-sm bg-white">
                                    <IconShieldAlert size={24} className="text-emerald-600 mb-1"/>
                                    <span className="text-sm font-bold text-emerald-800">Competitor</span>
                                    <span className="text-xs text-emerald-600">競合</span>
                                </div>
                            </div>
                        </div>
                        {threecResult && threecResult.summary && (
                            <p className="text-xs text-slate-500 mt-3 border-t border-slate-100 pt-2 line-clamp-2 relative z-20">{threecResult.summary}</p>
                        )}
                        </div>
                    </div>

                    {/* Step 4: SWOT & Strategy (Side by Side) */}
                    <div className="relative flex flex-col md:flex-row justify-center gap-6 mb-12 max-w-4xl mx-auto">
                        
                        {/* SWOT */}
                        <div 
                        className="flex-1 bg-white rounded-xl shadow-md border-t-8 border-teal-500 p-6 hover:shadow-xl transition-shadow cursor-pointer transform hover:-translate-y-1 transition-all duration-200"
                        onClick={() => { setSwotModal(swotResult ? 'result' : 'menu'); setSwotError(''); }}
                        title="クリックしてメニューを開く"
                        >
                        <div className="flex items-center gap-2 mb-3">
                            <IconActivity size={24} className="text-teal-600" />
                            <h2 className="text-xl font-bold text-slate-800">クロスSWOT分析</h2>
                            {swotResult ? (
                                <span className="text-[10px] font-bold bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded ml-auto">✓ {String(swotResult.analyzedAt || '').slice(5).replace('-', '/')}</span>
                            ) : (
                                <span className="text-[10px] font-bold bg-slate-100 text-slate-400 px-1.5 py-0.5 rounded ml-auto">未取込</span>
                            )}
                        </div>
                        <p className="text-sm text-slate-600 mb-4">「強み×機会」で攻めるか、「弱み×脅威」で守るか。具体的な勝ち筋を見つける。</p>
                        <div className="mb-3"><PromptButton onClick={() => openPrompt('swot')} /></div>
                        <div className="grid grid-cols-2 gap-2 text-center text-xs text-white font-bold">
                            <div className="bg-teal-400 p-2 rounded">強み (S)</div>
                            <div className="bg-teal-400 p-2 rounded">弱み (W)</div>
                            <div className="bg-teal-600 p-2 rounded">機会 (O)</div>
                            <div className="bg-teal-600 p-2 rounded">脅威 (T)</div>
                        </div>
                        {swotResult && swotResult.summary && (
                            <p className="text-xs text-slate-500 mt-3 border-t border-slate-100 pt-2 line-clamp-2">{swotResult.summary}</p>
                        )}
                        </div>

                        {/* Basic Strategy */}
                        <div 
                        className="flex-1 bg-white rounded-xl shadow-md border-t-8 border-cyan-500 p-6 hover:shadow-xl transition-shadow cursor-pointer transform hover:-translate-y-1 transition-all duration-200"
                        onClick={() => { setStrategyModal(strategyResult ? 'result' : 'menu'); setStrategyError(''); }}
                        title="クリックしてメニューを開く"
                        >
                        <div className="flex items-center gap-2 mb-3">
                            <IconZap size={24} className="text-cyan-600" />
                            <h2 className="text-xl font-bold text-slate-800">基本競争戦略</h2>
                            {strategyResult ? (
                                <span className="text-[10px] font-bold bg-emerald-100 text-emerald-700 px-1.5 py-0.5 rounded ml-auto">✓ {String(strategyResult.analyzedAt || '').slice(5).replace('-', '/')}</span>
                            ) : (
                                <span className="text-[10px] font-bold bg-slate-100 text-slate-400 px-1.5 py-0.5 rounded ml-auto">未取込</span>
                            )}
                        </div>
                        <p className="text-sm text-slate-600 mb-4">どのポジションで戦うか？</p>
                        <div className="mb-3"><PromptButton onClick={() => openPrompt('strategy')} /></div>
                        {strategyResult && strategyResult.data && strategyResult.data.position ? (
                            <div className="bg-cyan-50 border border-cyan-200 rounded-lg p-3 text-center">
                                <div className="text-[10px] text-cyan-500 font-bold mb-0.5">採用ポジション</div>
                                <div className="text-lg font-bold text-cyan-800">{strategyResult.data.position}</div>
                            </div>
                        ) : (
                            <ul className="space-y-2 text-sm">
                                <li className="flex items-center gap-2">
                                <span className="w-3 h-3 bg-cyan-500 rounded-full"></span>
                                コスト・リーダーシップ
                                </li>
                                <li className="flex items-center gap-2">
                                <span className="w-3 h-3 bg-cyan-500 rounded-full"></span>
                                差別化（独自性）
                                </li>
                                <li className="flex items-center gap-2">
                                <span className="w-3 h-3 bg-cyan-500 rounded-full"></span>
                                集中（ニッチ）
                                </li>
                            </ul>
                        )}
                        </div>
                    </div>
                    
                    {/* NEW Step: Business Model Canvas (Phase 2 to 3 Transition) */}
                    <div className="relative flex flex-col items-center mb-12">
                        <div 
                            className="w-full max-w-3xl bg-white rounded-xl shadow-md border-l-8 border-violet-500 overflow-hidden hover:shadow-xl transition-shadow cursor-pointer transform hover:-translate-y-1 transition-all duration-200" 
                            onClick={() => { setBmcModal(bmcResult ? 'result' : 'menu'); setBmcError(''); }}
                            title="クリックしてメニューを開く"
                        >
                            <div className="p-6">
                                <div className="flex justify-between items-center mb-2">
                                    <h2 className="text-2xl font-bold text-violet-800 flex items-center gap-2">
                                        <IconLayoutTemplate size={24} className="text-violet-600" />
                                        ビジネスモデルキャンバス
                                        <span className="text-xs font-normal text-violet-400 border border-violet-200 rounded px-1">Click to Open</span>
                                    </h2>
                                    <div className="flex items-center gap-2">
                                        {bmcResult ? (
                                            <span className="text-xs font-bold bg-emerald-100 text-emerald-700 px-2 py-1 rounded">✓ 取込済 {String(bmcResult.analyzedAt || '').slice(5).replace('-', '/')}</span>
                                        ) : (
                                            <span className="text-xs font-bold bg-slate-100 text-slate-400 px-2 py-1 rounded">未取込</span>
                                        )}
                                        <span className="text-xs font-semibold bg-violet-100 text-violet-800 px-2 py-1 rounded">ビジネスの全体設計</span>
                                    </div>
                                </div>
                                <p className="text-slate-600 mb-4 text-sm">決定した戦略をもとに、「誰に」「何を」「どうやって提供し」「どう儲けるか」を1枚の図に統合する。</p>
                                <div className="mb-3"><PromptButton onClick={() => openPrompt('bmc')} /></div>
                                
                                {/* Simplified BMC Graphic */}
                                <div className="grid grid-cols-5 gap-1 text-[10px] font-bold text-center text-slate-600 h-24">
                                    <div className="bg-slate-100 border border-slate-200 rounded p-1 flex flex-col justify-center">パートナー<br/>(KP)</div>
                                    <div className="flex flex-col gap-1">
                                        <div className="bg-slate-100 border border-slate-200 rounded p-1 h-full flex flex-col justify-center">活動<br/>(KA)</div>
                                        <div className="bg-slate-100 border border-slate-200 rounded p-1 h-full flex flex-col justify-center">リソース<br/>(KR)</div>
                                    </div>
                                    <div className="bg-violet-100 border border-violet-200 text-violet-800 rounded p-1 flex flex-col justify-center shadow-inner">価値提案<br/>(VP)</div>
                                    <div className="flex flex-col gap-1">
                                        <div className="bg-slate-100 border border-slate-200 rounded p-1 h-full flex flex-col justify-center">関係<br/>(CR)</div>
                                        <div className="bg-slate-100 border border-slate-200 rounded p-1 h-full flex flex-col justify-center">チャネル<br/>(CH)</div>
                                    </div>
                                    <div className="bg-slate-100 border border-slate-200 rounded p-1 flex flex-col justify-center">顧客<br/>(CS)</div>
                                    
                                    {/* Cost & Revenue */}
                                    <div className="col-span-2 bg-slate-100 border border-slate-200 rounded p-1 flex flex-col justify-center">コスト構造 (C$)</div>
                                    <div className="col-span-3 bg-emerald-50 border border-emerald-200 text-emerald-700 rounded p-1 flex flex-col justify-center">収益の流れ (R$)</div>
                                </div>
                                {bmcResult && bmcResult.summary && (
                                    <p className="text-xs text-slate-500 mt-3 border-t border-slate-100 pt-2 line-clamp-2">{bmcResult.summary}</p>
                                )}
                            </div>
                        </div>
                    </div>

                    </div>

                    {/* PHASE 3: EXECUTION */}
                    {/* IDを追加: 実行・改善のリンク先 */}
                    <div id="phase-execution" className="relative scroll-mt-8">
                    {/* Step 5: Action */}
                    <div className="relative flex flex-col items-center mb-8">
                        <div className="z-10 bg-amber-600 text-white px-6 py-2 rounded-full font-bold shadow-lg mb-4 flex items-center gap-2">
                        <IconShoppingCart size={20} />
                        Phase 3: 実行と体制（アクション）
                        </div>
                        
                        <div className="flex flex-col md:flex-row gap-6 w-full max-w-4xl">
                        
                        {/* 4P Analysis */}
                        <div 
                            className="flex-1 bg-white rounded-xl shadow-md border-b-8 border-amber-500 p-6 hover:shadow-xl transition-shadow cursor-pointer transform hover:-translate-y-1 transition-all duration-200"
                            onClick={() => { setFourpModal(fourpResult ? 'result' : 'menu'); setFourpError(''); }}
                            title="クリックしてメニューを開く"
                        >
                            <div className="flex justify-between items-center mb-3">
                            <h2 className="text-2xl font-bold text-amber-800">4P分析</h2>
                            <div className="flex items-center gap-2">
                                {fourpResult ? (
                                    <span className="text-xs font-bold bg-emerald-100 text-emerald-700 px-2 py-1 rounded">✓ {String(fourpResult.analyzedAt || '').slice(5).replace('-', '/')}</span>
                                ) : (
                                    <span className="text-xs font-bold bg-slate-100 text-slate-400 px-2 py-1 rounded">未取込</span>
                                )}
                                <span className="text-xs bg-amber-100 text-amber-800 px-2 py-1 rounded font-bold">マーケティング</span>
                            </div>
                            </div>
                            <p className="text-slate-600 mb-4 text-sm">顧客に届けるための具体的戦術</p>
                            <div className="mb-3"><PromptButton onClick={() => openPrompt('4p')} /></div>
                            <div className="grid grid-cols-2 gap-3">
                                <div className="bg-amber-50 p-3 rounded border border-amber-100">
                                <div className="font-bold text-amber-700 text-sm">Product</div>
                                <div className="text-xs text-slate-500">製品・サービス</div>
                                </div>
                                <div className="bg-amber-50 p-3 rounded border border-amber-100">
                                <div className="font-bold text-amber-700 text-sm">Price</div>
                                <div className="text-xs text-slate-500">価格設定</div>
                                </div>
                                <div className="bg-amber-50 p-3 rounded border border-amber-100">
                                <div className="font-bold text-amber-700 text-sm">Place</div>
                                <div className="text-xs text-slate-500">流通・場所</div>
                                </div>
                                <div className="bg-amber-50 p-3 rounded border border-amber-100">
                                <div className="font-bold text-amber-700 text-sm">Promotion</div>
                                <div className="text-xs text-slate-500">販促・広告</div>
                                </div>
                            </div>
                            {fourpResult && fourpResult.summary && (
                                <p className="text-xs text-slate-500 mt-3 border-t border-slate-100 pt-2 line-clamp-2">{fourpResult.summary}</p>
                            )}
                        </div>

                        {/* 7S Analysis */}
                        <div 
                            className="flex-1 bg-white rounded-xl shadow-md border-b-8 border-orange-600 p-6 hover:shadow-xl transition-shadow cursor-pointer transform hover:-translate-y-1 transition-all duration-200"
                            onClick={() => { setSevensModal(sevensResult ? 'result' : 'menu'); setSevensError(''); }}
                            title="クリックしてメニューを開く"
                        >
                            <div className="flex justify-between items-center mb-3">
                            <h2 className="text-2xl font-bold text-orange-800">7S分析</h2>
                            <div className="flex items-center gap-2">
                                {sevensResult ? (
                                    <span className="text-xs font-bold bg-emerald-100 text-emerald-700 px-2 py-1 rounded">✓ {String(sevensResult.analyzedAt || '').slice(5).replace('-', '/')}</span>
                                ) : (
                                    <span className="text-xs font-bold bg-slate-100 text-slate-400 px-2 py-1 rounded">未取込</span>
                                )}
                                <span className="text-xs bg-orange-100 text-orange-800 px-2 py-1 rounded font-bold">組織マネジメント</span>
                            </div>
                            </div>
                            <p className="text-slate-600 mb-4 text-sm">戦略を実行できる組織体制か？</p>
                            <div className="mb-3"><PromptButton onClick={() => openPrompt('7s')} /></div>
                            <div className="space-y-3">
                            <div>
                                <span className="text-xs font-bold text-orange-600 uppercase tracking-wider">ハードの3S (構造)</span>
                                <div className="text-sm text-slate-700 bg-orange-50 px-2 py-1 rounded mt-1">
                                戦略・組織・システム
                                </div>
                            </div>
                            <div>
                                <span className="text-xs font-bold text-orange-600 uppercase tracking-wider">ソフトの4S (人・価値観)</span>
                                <div className="text-sm text-slate-700 bg-orange-50 px-2 py-1 rounded mt-1">
                                価値観・スキル・人材・スタイル
                                </div>
                            </div>
                            </div>
                            {sevensResult && sevensResult.summary && (
                                <p className="text-xs text-slate-500 mt-3 border-t border-slate-100 pt-2 line-clamp-2">{sevensResult.summary}</p>
                            )}
                        </div>

                        </div>
                    </div>
                    </div>

                    {/* 課題解決イノベーター（全フェーズ俯瞰・独立カード） */}
                    <div className="mt-16">
                        <div className="text-center mb-4">
                            <span className="text-xs font-bold text-fuchsia-500 tracking-wider uppercase">Cross-Industry Innovation</span>
                            <h3 className="text-lg font-bold text-slate-700">分析を超えて、発想を飛ばす</h3>
                        </div>
                        <div
                            className="w-full bg-gradient-to-br from-fuchsia-500 via-purple-500 to-indigo-500 rounded-2xl shadow-lg p-0.5 hover:shadow-2xl transition-shadow cursor-pointer transform hover:-translate-y-1 transition-all duration-200"
                            onClick={() => handleAnalysisClick('innovator')}
                            title="クリックしてCanvasを開く"
                        >
                            <div className="bg-white rounded-2xl p-6">
                                <div className="flex justify-between items-start mb-2">
                                    <h2 className="text-2xl font-bold flex items-center gap-2 bg-gradient-to-r from-fuchsia-600 to-indigo-600 bg-clip-text text-transparent">
                                        <IconZap size={26} className="text-fuchsia-500" />
                                        課題解決イノベーター
                                    </h2>
                                    <span className="text-xs font-semibold bg-fuchsia-100 text-fuchsia-700 px-2 py-1 rounded">アイデア発想</span>
                                </div>
                                <p className="text-slate-600 mb-4 text-sm">これまでの分析で見えた課題を、<b>他業種の成功事例の仕組み</b>を応用して解決する。AIと対話しながら画期的なアイデアを引き出します。</p>
                                <div className="flex items-center gap-3 flex-wrap">
                                    <button
                                        onClick={(e) => { e.stopPropagation(); handleAnalysisClick('innovator'); }}
                                        className="inline-flex items-center gap-2 px-4 py-2 bg-gradient-to-r from-fuchsia-600 to-indigo-600 text-white font-bold rounded-lg hover:opacity-90 transition-opacity text-sm shadow"
                                    >
                                        <IconZap size={16} /> Canvasでアイデアを出す
                                    </button>
                                    <PromptButton onClick={() => openPrompt('innovator')} />
                                    <span className="text-xs text-slate-400">※ このカードは結果の取り込み対象外です</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* 統合サマリー */}
                    <div className="mt-16 bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                        <div className="flex flex-wrap items-center justify-between gap-3 mb-6">
                            <div>
                                <h3 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                                    <IconLayers size={24} /> 分析結果サマリー
                                </h3>
                                {basicRegistered && (
                                    <p className="text-sm text-slate-500 mt-1">
                                        対象: <b className="text-slate-700">{basicInfo.subject}</b>
                                        {lastUpdated && <span className="ml-3">最終分析日: {lastUpdated}</span>}
                                    </p>
                                )}
                                <div className="flex items-center gap-3 mt-2 text-xs">
                                    <button onClick={exportAllData} disabled={completedCount === 0 && !basicRegistered}
                                        className="text-slate-500 hover:text-slate-700 underline disabled:opacity-30 disabled:cursor-not-allowed">
                                        全結果をJSONで書き出す
                                    </button>
                                    <label className="text-slate-500 hover:text-slate-700 underline cursor-pointer">
                                        JSONから復元する
                                        <input type="file" accept=".json,application/json" onChange={importAllData} className="hidden" />
                                    </label>
                                </div>
                            </div>
                            <div className="flex items-center gap-3">
                                <div className="text-right">
                                    <div className="text-2xl font-bold text-blue-700">{completedCount} <span className="text-sm text-slate-400 font-normal">/ 8 分析完了</span></div>
                                </div>
                                <button
                                    onClick={() => setShowReport(true)}
                                    disabled={completedCount === 0}
                                    className="px-4 py-2 bg-slate-800 text-white font-bold rounded-lg hover:bg-slate-900 transition-colors text-sm disabled:opacity-30 disabled:cursor-not-allowed flex items-center gap-2"
                                >
                                    <IconClipboard size={16} /> 印刷用レポートを開く
                                </button>
                            </div>
                        </div>

                        {/* 進捗ミニ一覧 */}
                        <div className="grid grid-cols-4 md:grid-cols-8 gap-2 mb-6">
                            {ORDER.map(id => (
                                <div key={id} className={"text-center py-2 rounded-lg text-[11px] font-bold " + (results[id] ? "bg-emerald-100 text-emerald-700" : "bg-slate-100 text-slate-400")}>
                                    {results[id] ? '✓' : '－'}<br/>{(ANALYSIS_META[id] || {}).name}
                                </div>
                            ))}
                        </div>

                        {/* 要約一覧（フェーズ順） */}
                        {completedCount === 0 ? (
                            <p className="text-sm text-slate-400 text-center py-6">まだ取り込まれた分析結果がありません。各カードから分析結果を取り込むとここに表示されます。</p>
                        ) : (
                            <div className="space-y-2">
                                {ORDER.filter(id => results[id]).map(id => (
                                    <div key={id} className="border border-slate-200 rounded-lg px-4 py-2.5 flex items-start gap-3">
                                        <span className="text-xs font-bold text-slate-400 shrink-0 w-24">{(ANALYSIS_META[id] || {}).name}</span>
                                        <p className="text-sm text-slate-700 flex-1">{results[id].summary || '（要約なし）'}</p>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Matrix / Summary Footer */}
                    <div className="mt-16 bg-white p-8 rounded-2xl shadow-sm border border-slate-200">
                    <h3 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                        <IconLayers size={24} />
                        目的別・使い分け早見表
                    </h3>
                    <p className="text-sm text-slate-500 mb-4">クリックすると該当エリアへ移動します</p>
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                        
                        {/* リンク機能を追加 */}
                        <div 
                        className="bg-slate-50 p-4 rounded-lg cursor-pointer hover:bg-blue-50 hover:shadow-md transition-all border border-transparent hover:border-blue-200"
                        onClick={() => scrollToSection('phase-analysis')}
                        >
                        <h4 className="font-bold text-slate-700 mb-2 flex items-center gap-2 text-blue-700">
                            <IconSearch size={16} /> 状況把握
                        </h4>
                        <p className="text-sm text-slate-600 mb-2">
                            「市場はどうなってる？」「競合は？」を知りたいとき
                        </p>
                        <div className="flex flex-wrap gap-2">
                            <span className="text-xs bg-white border border-slate-300 px-2 py-1 rounded text-slate-500">PESTEL</span>
                            <span className="text-xs bg-white border border-slate-300 px-2 py-1 rounded text-slate-500">5フォース</span>

                                        ['size', '規模（従業員数・売上など）', false, '例：従業員12名・年商1.8億円／個人事業・スタッフ3名'],
                                        ['business', '事業内容', true, '例：地域の中小企業向けに税務顧問業務を提供。特に電帳法・インボイス対応の実務支援と、事業承継コンサルに強み。顧問先は約60社。'],
                                        ['issues', '現状の課題', false, '例：後継者が不在で高齢化が進んでいる／価格競争が激しく単価が下がっている／若手の採用が難しい／DX対応が遅れている'],
                                        ['memo', '補足メモ', false, '例：3年前に代替わりし、現社長が二代目。地域内で紹介ルートが強い。Web発信はほぼしていない。'],
                                    ].map(([k, label, req, placeholder]) => (
                                        <div key={k} className="flex flex-col gap-1">
                                            <label className="text-sm font-bold text-slate-700">{label}{req && <span className="text-rose-500 ml-1">*</span>}</label>
                                            {k === 'business' || k === 'issues' || k === 'memo' ? (
                                                <textarea value={tempBasic[k]} onChange={(e) => handleBasicChange(k, e.target.value)}
                                                    placeholder={placeholder}
                                                    className="w-full px-3 py-2 border border-slate-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm h-16 placeholder:text-slate-300 placeholder:text-xs" />
                                            ) : (
                                                <input type="text" value={tempBasic[k]} onChange={(e) => handleBasicChange(k, e.target.value)}
                                                    placeholder={placeholder}
                                                    className="w-full px-3 py-2 border border-slate-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm placeholder:text-slate-300 placeholder:text-xs" />
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </div>
                            <div className="p-4 border-t border-slate-200 flex justify-end gap-3 bg-slate-50 rounded-b-xl">
                                <button onClick={() => setIsBasicOpen(false)} className="px-4 py-2 text-slate-600 font-bold hover:bg-slate-200 rounded text-sm">キャンセル</button>
                                <button onClick={saveBasic} disabled={!tempBasic.subject.trim()}
                                    className="px-6 py-2 bg-blue-600 text-white font-bold hover:bg-blue-700 rounded shadow-sm text-sm disabled:opacity-40 disabled:cursor-not-allowed">保存する</button>
                            </div>
                        </div>
                    </div>
                )}

                {/* プロンプト表示モーダル */}
                {promptModal && (
                    <div className="fixed inset-0 bg-slate-900/50 z-50 flex items-center justify-center p-4" onClick={() => setPromptModal(null)}>
                        <div className="bg-white rounded-xl shadow-2xl w-full max-w-2xl max-h-[90vh] flex flex-col" onClick={(e) => e.stopPropagation()}>
                            <div className="flex justify-between items-center p-4 border-b border-slate-200">
                                <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                                    <IconClipboard size={18} /> {(ANALYSIS_META[promptModal.id] || {}).name} の分析用プロンプト
                                </h2>
                                <button onClick={() => setPromptModal(null)} className="text-slate-500 hover:text-slate-800 p-1"><IconX size={24} /></button>
                            </div>
                            <div className="p-6 overflow-y-auto flex-1">
                                <p className="text-sm text-slate-600 mb-3">
                                    コピーしてCanvasの最初のメッセージとして貼り付けてください。基本情報と、取込済みの分析結果が含まれています。
                                </p>
                                <textarea readOnly value={promptModal.text} onClick={(e) => e.target.select()}
                                    className="w-full h-72 px-3 py-2 border border-slate-300 rounded font-mono text-xs bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500" />
                            </div>
                            <div className="p-4 border-t border-slate-200 flex justify-between gap-3 bg-slate-50 rounded-b-xl">
                                <button onClick={() => { setPromptModal(null); handleAnalysisClick(promptModal.id); }}
                                    className="px-4 py-2 text-blue-700 font-bold hover:bg-blue-50 rounded text-sm flex items-center gap-1">
                                    <IconGlobe size={16} /> Canvasを開く
                                </button>
                                <button onClick={copyPrompt}
                                    className="px-6 py-2 bg-blue-600 text-white font-bold hover:bg-blue-700 rounded shadow-sm text-sm">クリップボードにコピー</button>
                            </div>
                        </div>
                    </div>
                )}

                {/* 印刷用レポート */}
                {showReport && (
                    <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-start justify-center p-4 overflow-y-auto">
                        <div className="bg-white rounded-xl shadow-2xl w-full max-w-3xl my-8">
                            <div className="no-print flex justify-between items-center p-4 border-b border-slate-200 sticky top-0 bg-white rounded-t-xl">
                                <h2 className="text-lg font-bold text-slate-800">印刷用レポート プレビュー</h2>
                                <div className="flex items-center gap-2">
                                    <button onClick={() => window.print()}
                                        className="px-4 py-2 bg-slate-800 text-white font-bold rounded-lg hover:bg-slate-900 transition-colors text-sm">
                                        印刷する / PDF保存
                                    </button>
                                    <button onClick={() => setShowReport(false)} className="text-slate-500 hover:text-slate-800 p-2">
                                        <IconX size={22} />
                                    </button>
                                </div>
                            </div>

                            <div id="report-print-area" className="p-8">
                                <div className="mb-6 pb-4 border-b-2 border-slate-300 flex items-center justify-between">
                                    <div>
                                        <h1 className="text-2xl font-bold text-slate-800">経営分析レポート</h1>
                                        <p className="text-sm text-slate-500 mt-1">
                                            作成日: {new Date().toLocaleDateString('ja-JP')}
                                            {lastUpdated && <span className="ml-3">最終分析日: {lastUpdated}</span>}
                                        </p>
                                    </div>
                                    <div className="text-right shrink-0">
                                        <div className="text-xs text-slate-400 font-bold">分析進捗</div>
                                        <div className="flex gap-1 mt-1">
                                            {ORDER.map(id => (
                                                <span key={id} className={"w-4 h-4 rounded-sm " + (results[id] ? "bg-blue-200" : "bg-slate-100")}></span>
                                            ))}
                                        </div>
                                        <div className="text-xs text-slate-400 mt-1">{completedCount} / 8 完了</div>
                                    </div>
                                </div>

                                {/* 基本情報（チップ風） */}
                                {basicRegistered && (
                                    <div className="mb-8 bg-slate-50 border border-slate-200 rounded-xl p-4">
                                        <div className="flex items-center gap-2 mb-3">
                                            <IconBriefcase size={18} className="text-slate-500" />
                                            <h2 className="text-base font-bold text-slate-700">{basicInfo.subject}</h2>
                                        </div>
                                        <div className="grid grid-cols-2 md:grid-cols-3 gap-2 text-xs">
                                            {[
                                                ['業種', basicInfo.industry],
                                                ['所在地', basicInfo.location],
                                                ['規模', basicInfo.size],
                                                ['事業内容', basicInfo.business],
                                                ['現状の課題', basicInfo.issues],
                                            ].filter(([, v]) => v).map(([k, v]) => (
                                                <div key={k} className="bg-white border border-slate-200 rounded-lg px-2.5 py-1.5">
                                                    <div className="text-slate-400 text-[10px] font-bold">{k}</div>
                                                    <div className="text-slate-700">{v}</div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}

                                {completedCount === 0 && (
                                    <p className="text-sm text-slate-400">取り込まれた分析結果がありません。</p>
                                )}

                                {/* 各分析セクション */}
                                {ORDER.filter(id => results[id]).map((id, idx) => {
                                    const r = results[id];
                                    const d = r.data || {};
                                    const rm = REPORT_META[id] || {};
                                    const RIcon = rm.icon;
                                    return (
                                        <div key={id} className={"mb-6 break-inside-avoid border rounded-xl overflow-hidden " + (rm.border || 'border-slate-200')}>
                                            <div className={"px-4 py-2.5 flex items-center gap-2 " + (rm.headerBg || 'bg-slate-50')}>
                                                {RIcon && <RIcon size={18} className={rm.headerText || 'text-slate-600'} />}
                                                <h2 className={"text-sm font-bold " + (rm.headerText || 'text-slate-700')}>
                                                    {idx + 1}. {(ANALYSIS_META[id] || {}).name}
                                                </h2>
                                                <span className="text-[10px] text-slate-400 ml-auto">{r.analyzedAt || '—'}</span>
                                            </div>
                                            <div className="p-4">
                                                {r.summary && <p className="text-xs text-slate-600 mb-3 italic">{r.summary}</p>}

                                                {id === 'pestel' && (
                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                                                        {[['politics','政治'],['economy','経済'],['society','社会'],['technology','技術'],['environment','環境'],['legal','法律']].map(([k,label]) => {
                                                            const items = d[k] || [];
                                                            if (items.length === 0) return null;
                                                            return (
                                                                <div key={k} className="border border-slate-100 rounded-lg p-2">
                                                                    <div className="text-[10px] font-bold text-blue-600 mb-1">{label}</div>
                                                                    {items.map((it, i) => (
                                                                        <div key={i} className="text-xs text-slate-700 flex items-start gap-1.5 mb-0.5">
                                                                            <span className={"text-[9px] font-bold px-1 rounded shrink-0 mt-0.5 " + (it.type === '機会' ? 'bg-emerald-50 text-emerald-600' : it.type === '脅威' ? 'bg-rose-50 text-rose-600' : 'bg-slate-100 text-slate-400')}>{it.type}</span>
                                                                            <span>{it.item}</span>
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            );
                                                        })}
                                                    </div>
                                                )}

                                                {id === '5forces' && (
                                                    <div className="space-y-1.5">
                                                        {[['rivalry','競合他社'],['newEntrants','新規参入'],['substitutes','代替品'],['buyers','買い手'],['suppliers','売り手']].map(([k,label]) => {
                                                            const f = d[k] || {};
                                                            const lv = f.level;
                                                            const lvCls = lv === '高' ? 'bg-rose-50 text-rose-600' : lv === '中' ? 'bg-amber-50 text-amber-600' : lv === '低' ? 'bg-emerald-50 text-emerald-600' : 'bg-slate-100 text-slate-400';
                                                            return (
                                                                <div key={k} className="flex items-start gap-2 text-xs">
                                                                    <span className={"font-bold px-1.5 py-0.5 rounded shrink-0 w-20 text-center " + lvCls}>{label} {lv || '—'}</span>
                                                                    <span className="text-slate-600 pt-0.5">{(f.factors||[]).join(' / ')}</span>
                                                                </div>
                                                            );
                                                        })}
                                                        {d.overall && (
                                                            <div className="mt-2 bg-indigo-50 rounded-lg px-3 py-2 text-xs text-indigo-700">{d.overall}</div>
                                                        )}
                                                    </div>
                                                )}

                                                {id === '3c' && (
                                                    <div>
                                                        <div className="grid grid-cols-1 md:grid-cols-3 gap-2">
                                                            {[['customer','顧客・市場'],['competitor','競合'],['company','自社']].map(([k,label]) => (
                                                                <div key={k} className="bg-emerald-50 rounded-lg p-2">
                                                                    <div className="text-[10px] font-bold text-emerald-600 mb-1">{label}</div>
                                                                    {(d[k]||[]).map((it,i) => <div key={i} className="text-xs text-slate-700">・{it}</div>)}
                                                                </div>
                                                            ))}
                                                        </div>
                                                        {(d.ksf||[]).length > 0 && (
                                                            <div className="mt-2 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2">
                                                                <div className="text-[10px] font-bold text-amber-600 mb-0.5">⭐ 成功要因（KSF）</div>
                                                                <div className="text-xs text-slate-700">{d.ksf.join(' / ')}</div>
                                                            </div>
                                                        )}
                                                    </div>
                                                )}

                                                {id === 'swot' && (
                                                    <div>
                                                        <div className="grid grid-cols-2 gap-2">
                                                            {[['strengths','強み','bg-teal-50 text-teal-700'],['weaknesses','弱み','bg-orange-50 text-orange-700'],['opportunities','機会','bg-sky-50 text-sky-700'],['threats','脅威','bg-rose-50 text-rose-700']].map(([k,label,cls]) => (
                                                                <div key={k} className={"rounded-lg p-2 " + cls}>
                                                                    <div className="text-[10px] font-bold mb-1">{label}</div>
                                                                    <div className="text-xs text-slate-700">{(d[k]||[]).join(' / ') || '—'}</div>
                                                                </div>
                                                            ))}
                                                        </div>
                                                        {d.cross && (
                                                            <div className="grid grid-cols-2 gap-2 mt-2">
                                                                {[['so','SO：積極化'],['wo','WO：改善'],['st','ST：差別化'],['wt','WT：防衛']].map(([k,label]) => (
                                                                    (d.cross[k]||[]).length > 0 && (
                                                                        <div key={k} className="bg-slate-50 rounded-lg p-2">
                                                                            <div className="text-[10px] font-bold text-slate-500 mb-1">{label}</div>
                                                                            <div className="text-xs text-slate-700">{d.cross[k].join(' / ')}</div>
                                                                        </div>
                                                                    )
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>
                                                )}

                                                {id === 'strategy' && (
                                                    <div>
                                                        <span className="inline-block bg-cyan-50 border border-cyan-200 text-cyan-700 text-sm font-bold px-3 py-1 rounded-full mb-2">
                                                            採用ポジション: {d.position || '—'}
                                                        </span>
                                                        {d.rationale && <p className="text-xs text-slate-600 mb-2">{d.rationale}</p>}
                                                        {(d.actions||[]).length > 0 && (
                                                            <ul className="space-y-1">
                                                                {d.actions.map((a,i) => (
                                                                    <li key={i} className="text-xs text-slate-700 flex items-start gap-1.5">
                                                                        <span className="w-4 h-4 bg-cyan-50 text-cyan-600 rounded-full text-[9px] font-bold flex items-center justify-center shrink-0 mt-0.5">{i+1}</span>
                                                                        <span>{a}</span>
                                                                    </li>
                                                                ))}
                                                            </ul>
                                                        )}
                                                    </div>
                                                )}

                                                {id === 'bmc' && (
                                                    <div className="grid grid-cols-1 md:grid-cols-5 gap-1.5 text-[10px]">
                                                        {[['kp','パートナー'],['ka','活動'],['kr','リソース']].map(([k,l]) => (
                                                            <div key={k} className="bg-slate-50 rounded p-1.5"><div className="font-bold text-slate-400">{l}</div><div className="text-slate-700">{(d[k]||[]).join(' / ')}</div></div>
                                                        ))}
                                                        <div className="bg-violet-50 rounded p-1.5"><div className="font-bold text-violet-500">価値提案</div><div className="text-slate-700">{(d.vp||[]).join(' / ')}</div></div>
                                                        {[['cr','関係'],['ch','チャネル'],['cs','顧客層']].map(([k,l]) => (
                                                            <div key={k} className="bg-slate-50 rounded p-1.5"><div className="font-bold text-slate-400">{l}</div><div className="text-slate-700">{(d[k]||[]).join(' / ')}</div></div>
                                                        ))}
                                                        <div className="col-span-2 md:col-span-2 bg-slate-50 rounded p-1.5"><div className="font-bold text-slate-400">コスト構造</div><div className="text-slate-700">{(d.cost||[]).join(' / ')}</div></div>
                                                        <div className="col-span-3 md:col-span-3 bg-emerald-50 rounded p-1.5"><div className="font-bold text-emerald-500">収益の流れ</div><div className="text-slate-700">{(d.revenue||[]).join(' / ')}</div></div>
                                                    </div>
                                                )}

                                                {id === '4p' && (
                                                    <div className="grid grid-cols-2 gap-2">
                                                        {[['product','Product'],['price','Price'],['place','Place'],['promotion','Promotion']].map(([k,label]) => (
                                                            <div key={k} className="bg-amber-50 rounded-lg p-2">
                                                                <div className="text-[10px] font-bold text-amber-600 mb-1">{label}</div>
                                                                <div className="text-xs text-slate-700">{(d[k]||[]).join(' / ') || '—'}</div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}

                                                {id === '7s' && (
                                                    <div>
                                                        <div className="grid grid-cols-1 gap-1">
                                                            {[['strategy','Strategy'],['structure','Structure'],['systems','Systems']].map(([k,label]) => (
                                                                <div key={k} className="bg-orange-50 rounded px-2 py-1 text-xs flex gap-2">
                                                                    <span className="font-bold text-orange-600 w-24 shrink-0">{label}</span>
                                                                    <span className="text-slate-700">現状: {(d[k]||{}).current || '—'}　課題: {(d[k]||{}).issue || '—'}</span>
                                                                </div>
                                                            ))}
                                                            {[['sharedValues','Shared Values'],['skills','Skills'],['staff','Staff'],['style','Style']].map(([k,label]) => (
                                                                <div key={k} className="bg-amber-50 rounded px-2 py-1 text-xs flex gap-2">
                                                                    <span className="font-bold text-amber-600 w-24 shrink-0">{label}</span>
                                                                    <span className="text-slate-700">現状: {(d[k]||{}).current || '—'}　課題: {(d[k]||{}).issue || '—'}</span>
                                                                </div>
                                                            ))}
                                                        </div>
                                                        {d.alignment && (
                                                            <div className="mt-2 bg-orange-50 border border-orange-200 rounded-lg px-3 py-2 text-xs text-orange-700">{d.alignment}</div>
                                                        )}
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    );
                                })}

                                <div className="mt-8 pt-3 border-t border-slate-200 text-[10px] text-slate-300 text-right">
                                    ビジネスフレームワーク統合マップ で作成
                                </div>
                            </div>
                        </div>
                    </div>
                )}

                {/* 成功トースト */}
                {toast && (
                    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-[60] bg-emerald-600 text-white px-5 py-2.5 rounded-full shadow-lg text-sm font-bold flex items-center gap-2">
                        <span>✓</span> {toast}
                    </div>
                )}
                </div>
            );
        };

        // 白画面の代わりに原因を表示するエラーバウンダリ
        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { error: null }; }
            static getDerivedStateFromError(error) { return { error }; }
            componentDidCatch(error, info) { console.error('描画エラー:', error, info); }
            render() {
                if (this.state.error) {
                    return (
                        <div style={{ padding: 20, fontFamily: 'sans-serif', color: '#b91c1c' }}>
                            <h2>エラーが発生しました</h2>
                            <pre style={{ whiteSpace: 'pre-wrap' }}>{String(this.state.error)}</pre>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><FrameworkInfographic /></ErrorBoundary>);
    </script>
</body>
</html>
